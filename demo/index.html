<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beam Store — BeamPay Checkout Demo</title>
    <style>
      :root {
        --indigo: #6366f1; --ink: #111827; --muted: #6b7280; --line: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif; color: var(--ink);
        margin: 0; background: #f3f4f6; line-height: 1.5;
      }
      header {
        background: white; border-bottom: 1px solid var(--line);
        padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      }
      header h1 { font-size: 18px; margin: 0; }
      header .hgroup { display: flex; align-items: center; gap: 14px; }
      header .net { font-size: 12px; color: var(--muted); }
      #lang-toggle {
        font-size: 12px; font-weight: 600; cursor: pointer;
        background: white; color: var(--indigo); border: 1px solid var(--indigo);
        border-radius: 6px; padding: 4px 10px;
      }
      main { max-width: 720px; margin: 24px auto; padding: 0 16px; display: grid; gap: 20px; }
      .card { background: white; border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
      .card h2 { font-size: 15px; margin: 0 0 12px; }
      .product { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line); }
      .product:last-child { border-bottom: none; }
      .qty { display: flex; gap: 6px; align-items: center; }
      .qty button { width: 26px; height: 26px; border: 1px solid var(--line); background: white; border-radius: 6px; cursor: pointer; }
      .qty button:disabled { opacity: 0.4; cursor: not-allowed; }
      .total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; margin-top: 12px; }
      button.act {
        margin-top: 12px; background: var(--indigo); color: white; border: none;
        border-radius: 8px; padding: 9px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
      button.act.ghost { background: white; color: var(--indigo); border: 1px solid var(--indigo); }
      button.act:disabled { opacity: 0.45; cursor: not-allowed; }
      .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
      #status { font-size: 13px; margin-top: 10px; white-space: pre-wrap; word-break: break-all; }
      .ok { color: #059669; } .bad { color: #dc2626; }
      code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-size: 12px; }

      /* ── mode selector ── */
      .modes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .mode {
        text-align: left; cursor: pointer; background: white; border: 1px solid var(--line);
        border-radius: 10px; padding: 12px; transition: border-color .15s, box-shadow .15s;
      }
      .mode:hover { border-color: var(--indigo); }
      .mode.sel { border-color: var(--indigo); box-shadow: 0 4px 16px rgba(99,102,241,.14); }
      .mode .tag { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--indigo); }
      .mode .ttl { font-size: 13px; font-weight: 600; margin: 4px 0 2px; }
      .mode .sub { font-size: 11px; color: var(--muted); }
      .mode .backend { display: inline-block; margin-top: 6px; font-size: 10px; font-weight: 700;
                       padding: 1px 6px; border-radius: 999px; background: #fef3c7; color: #d97706; }
      .mode .nobackend { display: inline-block; margin-top: 6px; font-size: 10px; font-weight: 700;
                         padding: 1px 6px; border-radius: 999px; background: #ecfdf5; color: #059669; }
      #mode-hint { font-size: 13px; color: var(--ink); margin-top: 14px; }
      .paylink { margin-top: 12px; font-size: 12px; font-family: ui-monospace, monospace;
                 background: #f9fafb; border: 1px solid var(--line); border-radius: 8px; padding: 10px; word-break: break-all; }
      .paylink.empty { display: none; }
      .pay-row { margin-top: 16px; }

      @media (max-width: 560px) { .modes { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <h1>⚡ Beam Store</h1>
      <div class="hgroup">
        <span class="net" data-i18n="tagline">BeamPay Checkout demo · BSC Testnet</span>
        <button id="lang-toggle">中文</button>
      </div>
    </header>
    <main>
      <!-- ── Cart ── -->
      <section class="card">
        <h2 data-i18n="cart">Cart</h2>
        <div id="products"></div>
        <div class="total"><span data-i18n="total">Total</span><span id="total">0 tUSDT</span></div>
        <button class="act ghost" id="faucet" data-i18n="faucet">Get test tUSDT</button>
        <div class="hint" id="faucet-hint" data-i18n="faucet_hint">Mints mock tUSDT to your wallet so you can pay.</div>
        <div class="hint">
          <a href="https://www.bnbchain.org/en/testnet-faucet" target="_blank" rel="noreferrer" data-i18n="faucet_bnb">Get tBNB (gas) ↗</a>
        </div>
      </section>

      <!-- ── Integration mode ── -->
      <section class="card">
        <h2 data-i18n="modes_title">Choose integration mode</h2>
        <div class="modes">
          <button class="mode" id="mode-A" data-mode="A">
            <div class="tag">A</div>
            <div class="ttl" data-i18n="mA_ttl">Pay link</div>
            <div class="sub" data-i18n="mA_sub">Share / invoice / QR</div>
            <span class="nobackend" data-i18n="no_backend">no backend at pay time</span>
          </button>
          <button class="mode" id="mode-B" data-mode="B">
            <div class="tag">B</div>
            <div class="ttl" data-i18n="mB_ttl">Inline</div>
            <div class="sub" data-i18n="mB_sub">Own site, fixed price</div>
            <span class="nobackend" data-i18n="no_backend">no backend at pay time</span>
          </button>
          <button class="mode sel" id="mode-C" data-mode="C">
            <div class="tag">C</div>
            <div class="ttl" data-i18n="mC_ttl">Callback</div>
            <div class="sub" data-i18n="mC_sub">Cart, dynamic price</div>
            <span class="backend" data-i18n="needs_backend">needs /sign backend</span>
          </button>
        </div>
        <div id="mode-hint"></div>
      </section>

      <!-- ── Pay ── -->
      <section class="card">
        <h2 data-i18n="pay_title">Pay</h2>
        <div class="paylink empty" id="paylink"></div>
        <div class="pay-row"><div id="pay"></div></div>
        <div id="status"></div>
      </section>
    </main>
    <script type="module" src="/demo/main.ts"></script>
  </body>
</html>
